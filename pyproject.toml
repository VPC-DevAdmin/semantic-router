[project]
name = "semantic-router-benchmark"
version = "0.0.0"
description = "Benchmark harness for the vLLM Semantic Router"
requires-python = ">=3.11"
readme = "README.md"

# Dependencies are intentionally empty in M0; populated in M1 once the
# DB + config layer lands.
dependencies = []

[project.optional-dependencies]
dev = []

[project.scripts]
benchmark = "benchmark.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/benchmark"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.mypy]
python_version = "3.11"
strict = true
