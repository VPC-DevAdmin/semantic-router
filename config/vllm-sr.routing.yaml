# vLLM Semantic Router — hand-maintained routing template.
#
# This file holds the parts of vllm-sr.yaml that are not derived from
# per-tier YAMLs: listeners, signals, decisions, modelCards (model strength),
# and global. The `providers` block is GENERATED from config/tiers/*.yaml.
#
# The full vllm-sr.yaml is built by `make gen-router-config` (or
# `benchmark gen-router-config`) and is gitignored.

version: v0.3

listeners:
  - name: http-8899
    address: 0.0.0.0
    port: 8899
    timeout: 300s

# `providers:` is GENERATED into the merged vllm-sr.yaml at build time.
# Do not add it here.

routing:
  # `modelCards:` is GENERATED from config/tiers/*.yaml (one card per tier
  # with quality_score derived from the tier's `level`). The router uses
  # these for model-strength reasoning when no decision rule matches.

  signals:
    keywords:
      - name: coding_keywords
        operator: OR
        method: bm25
        keywords:
          - function
          - python
          - javascript
          - typescript
          - algorithm
          - debug
          - refactor
          - implement
          - regex
          - SQL
          - API
          - class
          - method
        case_sensitive: false
        bm25_threshold: 0.1

      - name: complex_reasoning_keywords
        operator: OR
        method: bm25
        keywords:
          - analyze
          - evaluate
          - discuss
          - compare
          - design
          - architect
          - tradeoff
          - tradeoffs
          - critique
          - synthesize
          - propose
        case_sensitive: false
        bm25_threshold: 0.1

      - name: creative_writing_keywords
        operator: OR
        method: bm25
        keywords:
          - story
          - poem
          - creative
          - imagine
          - narrative
          - write a
          - draft a
        case_sensitive: false
        bm25_threshold: 0.1

      - name: judgment_keywords
        operator: OR
        method: bm25
        keywords:
          - should I
          - how should
          - is it ethical
          - is it justifiable
          - tradeoffs
          - weigh
          - decide between
          - recommend
        case_sensitive: false
        bm25_threshold: 0.1

      - name: explainer_keywords
        operator: OR
        method: bm25
        keywords:
          - explain
          - describe
          - what is
          - how does
          - summarize
          - translate
          - convert
        case_sensitive: false
        bm25_threshold: 0.1

  # Decisions evaluated in priority order; first match wins.
  #
  # Earlier versions of this file had two unreachable tiers:
  #   - T5 never fired (fallthrough caught nothing because T1 default-took it)
  #   - T2 never fired (no decision targeted it)
  # The set below maps the user-visible 5 tiers to keyword combinations
  # such that every tier is reachable. See tests/test_shipped_configs.py
  # for the exhaustive walk that proves it.
  decisions:
    - name: tier5-frontier
      description: Complex reasoning AND judgment — needs the frontier tier
      priority: 100
      rules:
        operator: AND
        conditions:
          - type: keyword
            name: complex_reasoning_keywords
          - type: keyword
            name: judgment_keywords
      modelRefs:
        - model: tier5
          use_reasoning: false

    - name: tier4-judgment
      description: Open-ended judgment / advice / ethics / strategy
      priority: 90
      rules:
        operator: AND
        conditions:
          - type: keyword
            name: judgment_keywords
      modelRefs:
        - model: tier4
          use_reasoning: false

    - name: tier4-complex
      description: Multi-step analytical reasoning
      priority: 80
      rules:
        operator: AND
        conditions:
          - type: keyword
            name: complex_reasoning_keywords
      modelRefs:
        - model: tier4
          use_reasoning: false

    - name: tier3-coding
      description: Coding tasks
      priority: 70
      rules:
        operator: AND
        conditions:
          - type: keyword
            name: coding_keywords
      modelRefs:
        - model: tier3
          use_reasoning: false

    - name: tier3-creative
      description: Creative writing
      priority: 60
      rules:
        operator: AND
        conditions:
          - type: keyword
            name: creative_writing_keywords
      modelRefs:
        - model: tier3
          use_reasoning: false

    - name: tier2-explainer
      description: General explainers and translations — workhorse tier
      priority: 30
      rules:
        operator: AND
        conditions:
          - type: keyword
            name: explainer_keywords
      modelRefs:
        - model: tier2
          use_reasoning: false

    - name: default-tier1
      description: Fallback — trivial lookups go to tier 1
      priority: 10
      rules:
        operator: AND
        conditions: []
      modelRefs:
        - model: tier1
          use_reasoning: false

global:
  stores:
    semantic_cache:
      enabled: false
  model_catalog:
    embeddings:
      semantic:
        mmbert_model_path: ""
        qwen3_model_path: ""
        gemma_model_path: ""
        bert_model_path: ""
        multimodal_model_path: ""
    modules:
      prompt_guard:
        enabled: false
        model_ref: ""
        model_id: ""
        jailbreak_mapping_path: ""
        use_mmbert_32k: false
      classifier:
        domain:
          model_ref: ""
          model_id: ""
          category_mapping_path: ""
          use_mmbert_32k: false
        pii:
          model_ref: ""
          model_id: ""
          pii_mapping_path: ""
          use_mmbert_32k: false
      feedback_detector:
        enabled: false
        model_ref: ""
        model_id: ""
        use_mmbert_32k: false

# Per-tier description / quality_score overrides used in the generated
# `routing.modelCards` block. Keyed by tier name. If omitted, defaults
# (quality_score = 0.5 + 0.1*(level-1), description = "Tier N") are used.
modelCards_overrides:
  tier1:
    quality_score: 0.50
    description: Tier 1 — tiny model, trivial queries.
  tier2:
    quality_score: 0.65
    description: Tier 2 — small model, simple coding and translation.
  tier3:
    quality_score: 0.80
    description: Tier 3 — mid-size model, substantive reasoning and code.
  tier4:
    quality_score: 0.90
    description: Tier 4 — large model, multi-step reasoning and synthesis.
  tier5:
    quality_score: 0.98
    description: Tier 5 — frontier model, novel synthesis and judgment.
