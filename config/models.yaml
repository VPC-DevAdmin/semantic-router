# Model tier registry — how the harness maps router-selected model names back
# to numeric tier levels for routing-accuracy comparisons.
#
# The `model_id` field MUST match exactly what the router emits in its
# `x-vsr-selected-model` response header. Right now those names come from
# `config/vllm-sr.yaml`'s `providers.models[].name`, which is the simple
# tier1/tier2/.../tier5 set below.
#
# When you swap in real backends (CPU model on port 8001, Anthropic API, etc.):
#   1. Update `endpoint` here to the real OpenAI-compatible endpoint
#   2. Update `model_id` if the router will emit a different name (e.g. claude-opus-4-7)
#   3. Update `config/vllm-sr.yaml` `providers.models[].name` to match
#
# All endpoints are OpenAI-compatible so swapping is a config-only change.

tiers:
  - name: tier1
    level: 1
    endpoint: http://localhost:8810/v1   # simulator (placeholder)
    model_id: tier1
    api_key_env: TIER1_API_KEY           # optional; unset for local sim
    specializations: [general]
    timeout_s: 30

  - name: tier2
    level: 2
    endpoint: http://localhost:8810/v1   # simulator (placeholder)
    model_id: tier2
    api_key_env: TIER2_API_KEY
    specializations: [general, coding]
    timeout_s: 60

  - name: tier3
    level: 3
    endpoint: http://localhost:8810/v1   # simulator (placeholder)
    model_id: tier3
    api_key_env: TIER3_API_KEY
    specializations: [general, coding, math]
    timeout_s: 90

  - name: tier4
    level: 4
    endpoint: http://localhost:8810/v1   # simulator (placeholder)
    model_id: tier4
    api_key_env: TIER4_API_KEY
    specializations: [general, coding, math, reasoning]
    timeout_s: 120

  - name: tier5
    level: 5
    endpoint: http://localhost:8810/v1   # simulator (placeholder; will become Anthropic Opus)
    model_id: tier5
    api_key_env: TIER5_API_KEY
    specializations: [general, coding, math, reasoning, creative_writing]
    timeout_s: 180
