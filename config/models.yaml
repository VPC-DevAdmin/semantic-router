# Model tiers. Every endpoint is OpenAI-compatible (`/v1/chat/completions`).
# `level` is the routing-accuracy comparator. `specializations` is the taxonomy axis.
# Domain knowledge (legal/scientific/etc.) is NOT a specialization — it is tagged
# per-query as `domain_tags`. See PLAN.md.
#
# Set the api_key_env variables in your shell or in a .env file (gitignored).

tiers:
  - name: tier1-tiny
    level: 1
    endpoint: http://localhost:8001/v1
    model_id: llama-3.2-1b-instruct
    api_key_env: TIER1_API_KEY
    specializations: [general]
    timeout_s: 30

  - name: tier2-small
    level: 2
    endpoint: http://localhost:8002/v1
    model_id: qwen2.5-7b-instruct
    api_key_env: TIER2_API_KEY
    specializations: [general, code]
    timeout_s: 60

  - name: tier3-mid
    level: 3
    endpoint: http://localhost:8003/v1
    model_id: mixtral-8x7b-instruct
    api_key_env: TIER3_API_KEY
    specializations: [general, code, math]
    timeout_s: 90

  - name: tier4-large
    level: 4
    endpoint: http://localhost:8004/v1
    model_id: llama-3.1-70b-instruct
    api_key_env: TIER4_API_KEY
    specializations: [general, code, math, reasoning]
    timeout_s: 120

  - name: tier5-frontier
    level: 5
    endpoint: https://api.anthropic.com/v1
    model_id: claude-opus-4-7
    api_key_env: TIER5_API_KEY
    specializations: [general, code, math, reasoning, creative]
    timeout_s: 180

  # Specialization variants. They carry their own `level` so routing-accuracy
  # comparisons treat them as first-class options at that level.
  - name: tier3-vision
    level: 3
    endpoint: http://localhost:8013/v1
    model_id: qwen2-vl-7b
    api_key_env: TIER3_VISION_API_KEY
    specializations: [vision]
    timeout_s: 90

  - name: tier3-tts
    level: 3
    endpoint: http://localhost:8023/v1
    model_id: kokoro-tts
    api_key_env: TIER3_TTS_API_KEY
    specializations: [tts]
    timeout_s: 90
