# ═════════════════════════════════════════════════════════════════════════
# Router training data — semantic routing demo
# ═════════════════════════════════════════════════════════════════════════
#
# This file is the COMPLETE training data for the semantic router.
# It contains every exemplar and every routing rule. Nothing else
# teaches the router how to make decisions.
#
# Read this top-to-bottom and you know exactly what the router knows.
# No hidden training set. No fine-tuned weights. No keyword tricks.
#
# How it works:
#   1. Each "axis" below defines a contrastive embedding signal.
#      Exemplars on the `hard` side and the `easy` side get their
#      embeddings precomputed at router startup.
#   2. Incoming queries are embedded and compared to both sides
#      via cosine similarity. The difference becomes a score:
#      positive = closer to "hard", negative = closer to "easy".
#   3. Decision rules below combine these scores to pick a tier.
#
# To swap in a different training set: edit this file and restart
# the router. Nothing else needs to change.
#
# ─────────────────────────────────────────────────────────────────────────

schema_version: 1
name: "five-tier-complexity-router"

# ═════════════════════════════════════════════════════════════════════════
# Tiers — what we're routing to
# ═════════════════════════════════════════════════════════════════════════
# These are logical names. The mapping to actual model endpoints lives
# in router-backends.yaml. That separation lets us swap model identities
# (e.g. try a different T2 model) without touching this training file.

tiers:
  - id: tier1
    label: "T1 — small (~1B)"
    role: "Trivial factual lookups, format conversion, one-step transforms"
  - id: tier2
    label: "T2 — Qwen 3 30B-A3B (MoE)"
    role: "Workhorse: standard coding tasks, short explainers, common-knowledge synthesis"
  - id: tier3
    label: "T3 — GPT-OSS 120B"
    role: "Heavy reasoning, deep technical work, complex synthesis"
  - id: tier4
    label: "T4 — Claude Sonnet"
    role: "High-stakes judgment, advice, ethics, management, strategy"
  - id: tier5
    label: "T5 — Claude Opus"
    role: "Frontier — needed when a query is BOTH deeply technical AND demands judgment"

# ═════════════════════════════════════════════════════════════════════════
# Complexity axes — the exemplar banks
# ═════════════════════════════════════════════════════════════════════════
# Three independent axes of complexity. Each is judged by comparing the
# query's embedding to two reference sets — `hard` and `easy`.
#
# Design principles (do not violate when editing):
#   • Exemplars are GENERIC ARCHETYPES, not drawn from any evaluation set.
#     They describe what hard/easy LOOKS LIKE in general, across domains.
#   • Both sides need to be DIVERSE — a single domain on one side will
#     bias the signal toward that domain. Below, each side spans 6+
#     domains (math, code, life sciences, social sciences, humanities,
#     business, etc.) so the embedding learns the AXIS CONCEPT, not the
#     domain.
#   • Aim for ~10–14 exemplars per side. More doesn't help much; fewer
#     starts to be noisy.
#   • Exemplars on the `easy` side should still be PLAUSIBLE queries.
#     Trick exemplars ("asdf qwerty") teach the wrong thing.
#   • Include a few BORDERLINE exemplars near the threshold — they
#     teach the model where the line is, not just where the centroids are.

axes:

  # ─────────────────────────────────────────────────────────────────────
  # AXIS 1: Multi-step reasoning
  # ─────────────────────────────────────────────────────────────────────
  # Does answering require chaining multiple inferences, or can the
  # answer be retrieved / produced in one step?
  - id: reasoning
    description: "Does this query require multi-step reasoning?"
    # Per-axis threshold override. v0.3 embedding scores cluster around
    # 0.35–0.52 in our 110-query set; 0.42 catches "just-missed" matches
    # without lowering the easy-side bar.
    threshold_hard: 0.42
    score_bands:
      # The score is roughly cosine(query, hard_centroid) − cosine(query, easy_centroid).
      # Tune these bands if the score distribution looks miscalibrated
      # after the first run. DO NOT tune them per-query to fix specific failures.
      low:    { min: -1.00, max: -0.05 }
      medium: { min: -0.05, max:  0.05 }
      high:   { min:  0.05, max:  1.00 }
    exemplars:
      hard:
        # Math word problems / probability — chained arithmetic + setup
        - "Three pipes fill a tank — pipe A in 6 hours, B in 8 hours, C empties it in 12 hours. If all run together starting from empty, when is the tank full?"
        - "In a five-card poker hand from a standard deck, what's the probability of being dealt a flush, and how would you derive it?"
        # Proofs — multi-step formal reasoning
        - "Demonstrate that there are infinitely many primes."
        - "Show by induction that the sum of the first n cubes equals the square of the sum of the first n integers."
        # Code debugging — trace execution to find a flaw
        - "This recursive function returns wrong values for inputs near the recursion limit. Trace what's going wrong and explain the fix."
        - "Here is a SQL query that returns duplicate rows when joining three tables. Walk through why, and rewrite it to fix the issue."
        # Algorithm implementation — designing the algorithm, not transcribing it
        - "Design and implement a function that finds the longest palindromic subsequence in a string with O(n²) time. Walk through the DP setup and the recurrence."
        # Diagnostic / causal — chain inferences through a domain
        - "A patient presents with intermittent vertigo, hearing loss, and tinnitus. What's the differential and how would you narrow it down?"
        - "Walk through how a sudden 30% drop in labor-force participation would propagate through a modern economy over the following year."
        # Tradeoff analysis + recommendation
        - "When is union-find with path compression preferable to a balanced BST for connectivity queries, and what's the reasoning behind the tradeoff?"
        # Argument analysis — find unstated premises
        - "Identify the unstated premises in this argument, and explain whether removing each one breaks the conclusion."
        # Constraint satisfaction
        - "Five colleagues need to be assigned to three projects under these constraints. Find an assignment or prove none exists."
        # Counterfactual reasoning
        - "If antibiotics had never been discovered, trace the likely course of 20th-century population and economic development."
      easy:
        # Trivia / single-step lookups across diverse domains
        - "Which artist painted the Sistine Chapel ceiling?"
        - "Define photosynthesis."
        - "How many feet are in a mile?"
        - "When did World War II end?"
        - "What is the chemical symbol for sodium?"
        - "How many time zones span the contiguous United States?"
        - "Who wrote 'The Great Gatsby'?"
        - "What does the acronym HTML stand for?"
        - "How do you say 'thank you' in French?"
        - "What currency is used in Japan?"
        - "What is the largest organ in the human body?"
        - "Which planet is closest to the sun?"

  # ─────────────────────────────────────────────────────────────────────
  # AXIS 2: Deep domain expertise
  # ─────────────────────────────────────────────────────────────────────
  # Does the answer require specialist knowledge — vocabulary, internal
  # mechanics, edge cases — or is general knowledge enough?
  - id: expertise
    description: "Does this query require deep domain expertise?"
    threshold_hard: 0.42
    score_bands:
      low:    { min: -1.00, max: -0.05 }
      medium: { min: -0.05, max:  0.05 }
      high:   { min:  0.05, max:  1.00 }
    exemplars:
      hard:
        # Pure math / theoretical CS
        - "Explain why the Banach-Tarski paradox doesn't contradict measure theory."
        - "Discuss the lattice-based assumptions underlying CRYSTALS-Kyber and why they're believed to resist quantum attacks."
        # Distributed systems / networking deep details
        - "Walk through how Raft handles the split-vote scenario and the design choices that prevent livelock."
        - "Explain the BGP wedgie phenomenon and what configurations make it possible."
        # ML internals
        - "Explain why post-training int8 quantization sometimes fails on attention layers but works on FFN layers."
        # Programming language theory
        - "Describe how Rust's higher-ranked trait bounds (for<'a>) interact with closure inference."
        # Medicine / pharmacology
        - "Discuss the clinical implications of CYP3A4 inhibition for tacrolimus dosing in transplant patients."
        # Law — doctrinal specifics
        - "Trace the doctrinal evolution of the Commerce Clause from Wickard v. Filburn to NFIB v. Sebelius."
        # Materials / mechanical engineering
        - "Explain why titanium aluminide is preferred over nickel superalloys for certain high-temperature aerospace components."
        # Music theory / humanities specifics
        - "Discuss the rules for resolving the augmented sixth chord in late-Romantic harmony, and where they typically break down."
        # Linguistics — formal syntax
        - "Explain the c-command condition in binding theory and the empirical data that motivates it."
        # Finance / regulation specifics
        - "Walk through the mechanics of a Treasury-bond basis trade and the funding-cost dynamics that determine its profitability."
        # Substantive explanation of a common-knowledge concept — mid-level depth
        - "Explain how garbage collectors handle the tracing-vs-reference-counting trade-off, including the failure modes of each approach."
        # Creative-writing craft — frontier-quality short fiction asks
        - "Write a literary scene that conveys grief through specific gesture and what's left unsaid, in under 500 words, no exposition or backstory."
      easy:
        # Common definitions across diverse domains
        - "What is a renewable resource?"
        - "What does the acronym GPS stand for?"
        - "What causes a rainbow?"
        - "What does the heart do?"
        - "Who was Marie Curie?"
        - "What does 'evaporation' mean?"
        - "What is an atom made of?"
        - "How does Wi-Fi work, in general terms?"
        - "What is high blood pressure?"
        - "What is a peninsula?"
        - "What is the Mona Lisa famous for?"
        - "What is interest on a savings account?"

  # ─────────────────────────────────────────────────────────────────────
  # AXIS 3: Open-ended judgment
  # ─────────────────────────────────────────────────────────────────────
  # Does the answer require weighing tradeoffs, values, or context-
  # specific recommendations — or is there a definite answer?
  - id: judgment
    description: "Does this query require open-ended judgment or value-laden tradeoffs?"
    threshold_hard: 0.42
    score_bands:
      low:    { min: -1.00, max: -0.05 }
      medium: { min: -0.05, max:  0.05 }
      high:   { min:  0.05, max:  1.00 }
    exemplars:
      hard:
        # Career / professional
        - "I'm a senior engineer choosing between a tech lead role with people management and an IC architect role. How should I think about this?"
        # Architecture / strategy
        - "We're a 12-person team considering breaking our monolith into services. What are the considerations beyond the technical?"
        # Ethics
        - "Is it justifiable to deploy autonomous weapons systems even if they reduce overall casualties?"
        - "Is it appropriate to use LLM-generated content in academic publications, and under what conditions?"
        # People management
        - "An otherwise strong report has become passive-aggressive with peers after being passed over for promotion. How do I handle this?"
        # Life decisions
        - "I'm weighing a high-paying job I find meaningless against staying in a low-paying job I love. How should I think this through?"
        # Medical (preference-sensitive)
        - "I have two surgical options with different recovery profiles and recurrence risks. How do I work through choosing?"
        # Policy / civic
        - "How should a city balance preserving historic neighborhoods against allowing dense new housing?"
        - "How should I think about voting in a primary where my preferred candidate has no realistic path to nomination?"
        # Family / personal
        - "My elderly parent wants to age in place but can no longer manage safely alone. How do we have this conversation as a family?"
        # Aesthetic / creative
        - "Should our team's brand identity prioritize legibility or distinctiveness? Walk me through the tradeoffs."
        # Financial planning (preference-sensitive)
        - "Given my financial situation, should I pay down student debt aggressively or prioritize retirement contributions?"
        # Discursive ethical analysis — "Discuss the considerations of X"
        - "Discuss the ethical tensions in deploying facial recognition in public spaces, balancing law-enforcement utility against civil-liberties harms."
      easy:
        # Well-defined facts — no judgment required, across diverse domains
        - "What is 15 plus 27?"
        - "What color do you get when you mix blue and yellow?"
        - "How many weeks are in a year?"
        - "What is the chemical formula for table salt?"
        - "How long does it take Earth to orbit the sun?"
        - "Is the Sahara a desert?"
        - "What is the freezing point of water in Celsius?"
        - "Is a tomato a fruit or a vegetable, botanically?"
        - "Does JavaScript run in web browsers?"
        - "What is the square root of 144?"
        - "In what century did the Industrial Revolution begin in Britain?"
        - "Is Python a programming language?"

# ═════════════════════════════════════════════════════════════════════════
# Decision policy
# ═════════════════════════════════════════════════════════════════════════
# Rules evaluated in order. First match wins. Each rule names the axis
# bands it requires; an empty list means "any value on this axis".
#
# Why this order?
#   1. trivial:           catch obvious lookups first (cheap path)
#   2. light:             catch the workhorse band before anything else fires
#   3. frontier_synthesis: BOTH high judgment AND high technical → T5 (only path to T5)
#   4. hard_technical:    high technical, modest judgment → T3
#   5. judgment_advice:   high judgment, modest technical → T4
#   6. fallthrough:       safety net (shouldn't fire if axes are well-calibrated)
#
# Note: the original rule set made T5 unreachable — every band combination
# was covered by trivial / light / hard_technical / judgment_heavy, so
# "fallthrough_to_t5" was dead. Replaced judgment_heavy_to_t4 with
# judgment_advice_to_t4 (constrained to non-high R/E) and added
# frontier_synthesis_to_t5 to cover the case where a query genuinely
# needs both deep technical work AND nuanced judgment.

rules:

  - name: trivial_to_t1
    description: "All three axes low — trivial query, send to the smallest model"
    when:
      reasoning: [low]
      expertise: [low]
      judgment:  [low]
    route_to: tier1

  - name: light_to_t2
    description: "At most medium on every axis — workhorse tier"
    when:
      reasoning: [low, medium]
      expertise: [low, medium]
      judgment:  [low, medium]
    route_to: tier2

  - name: frontier_synthesis_to_t5
    description: "High judgment AND high technical depth — needs the frontier"
    when:
      judgment: [high]
    requires_any_high: [reasoning, expertise]
    route_to: tier5

  - name: hard_technical_to_t3
    description: "High reasoning or expertise, judgment low/medium — heavy technical work"
    when:
      judgment: [low, medium]
    requires_any_high: [reasoning, expertise]
    route_to: tier3

  - name: judgment_advice_to_t4
    description: "Judgment-heavy but not deeply technical — advice, ethics, strategy"
    when:
      reasoning: [low, medium]
      expertise: [low, medium]
      judgment:  [high]
    route_to: tier4

  - name: fallthrough_to_t5
    description: "Safety net — only fires if axis calibration leaves a query unclassified"
    when: {}
    route_to: tier5
