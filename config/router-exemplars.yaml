# ═════════════════════════════════════════════════════════════════════════
# Router training data — semantic routing demo
# ═════════════════════════════════════════════════════════════════════════
#
# Canonical v0.3 architecture (per upstream config.yaml + docs):
# routing.signals.{complexity,embeddings,structure,context} all feed
# routing.projections.scores.request_difficulty via weighted_sum.
# routing.projections.mappings.tier_band partitions the score into 5
# bands. routing.decisions[] routes each band to a tier model.
#
# The previous design used four contrastive `complexity` signals as the
# entire signal mix. A diagnostic confirmed they all fire `:medium` on
# 100% of queries — they were a constant, not a signal. The discrimination
# was being done by a single `frontier_synthesis` embedding contribution,
# producing a bimodal score distribution that couldn't reach T2 / T4.
#
# This file uses the canonical mix instead: ONE complexity signal,
# TWO embeddings (one detractor + one promoter), several structure
# signals (mechanical / regex-based gates), and a context signal.
# Different signal types capture different evidence; combined in
# weighted_sum, they give the score real gradient instead of bimodal
# collapse.
#
# Tuning surface — all in this file, all human-readable:
#   • `weight:` per signal — contribution to request_difficulty.
#   • `tier_cutoffs:` — where to split the score into bands.
#   • exemplar banks for embeddings and the complexity signal.
#
# To swap in a different training set: edit this file and restart the
# router (`make router-stop && make route`).
# ─────────────────────────────────────────────────────────────────────────

schema_version: 2
name: "five-tier-projection-router"

# ═════════════════════════════════════════════════════════════════════════
# Tier bands — request_difficulty → tier
# ═════════════════════════════════════════════════════════════════════════
# Four cutoffs produce five bands. Calibrated against the canonical
# diverse-signal projection: max practical score is roughly 0.55-0.70
# (sum of all positive contributions for a query that maxes every signal),
# minimum is around -0.15 (trivial query strongly matching the detractor
# embedding). Cutoffs are first-pass; tune from `eval_reporter.py` output
# after the next route pass.
tier_cutoffs: [0.03, 0.10, 0.18, 0.40]

# `:medium` complexity matches contribute `medium_weight_factor × weight`.
# Kept at 0.0 because diagnostic confirmed vllm-sr's contrastive classifier
# fires `:medium` on 100% of queries with zero discriminative power. The
# builder omits `:medium` inputs from the weighted_sum when this is 0.0.
medium_weight_factor: 0.0

# ═════════════════════════════════════════════════════════════════════════
# Tiers — what we're routing to
# ═════════════════════════════════════════════════════════════════════════
tiers:
  - id: tier1
    label: "T1 — small (~1B)"
    role: "Trivial factual lookups, format conversion, one-step transforms"
  - id: tier2
    label: "T2 — Qwen 3 30B-A3B (MoE)"
    role: "Workhorse: standard coding tasks, short explainers, common-knowledge synthesis"
  - id: tier3
    label: "T3 — GPT-OSS 120B"
    role: "Heavy reasoning, deep technical work, complex synthesis"
  - id: tier4
    label: "T4 — Claude Sonnet"
    role: "High-stakes judgment, advice, ethics, management, strategy"
  - id: tier5
    label: "T5 — Claude Opus"
    role: "Frontier — needed when a query is BOTH deeply technical AND demands judgment"

# ═════════════════════════════════════════════════════════════════════════
# Complexity signal — used ONCE (per canonical pattern)
# ═════════════════════════════════════════════════════════════════════════
# Single contrastive signal with one hard and one easy bank. Replaces the
# four signals that used to live here (needs_reasoning / _expertise /
# _judgment / demands_commitment) — they all fired `:medium` on 100% of
# queries with no per-query variance, so they were dead weight.
#
# Design principle: the hard bank contains diverse archetypes covering
# the "hard" axis broadly (reasoning, expertise, judgment, commitment).
# The easy bank covers diverse trivial/factual archetypes. Both sides
# are kept generic (no eval-set overlap).
complexity_signals:
  - id: query_difficulty
    description: "Is this query high-effort vs low-effort overall?"
    # Contrastive classifier emits signal = hard_score − easy_score.
    # Empirically (router logs, sample of 20 queries) the signal range
    # is [-0.32, +0.11] — small contrastive margins, not absolute
    # similarities. The previous 0.55 threshold was mathematically
    # unreachable, so EVERY query stayed at :medium and the +0.24 weight
    # never contributed to the projection score. 0.05 is the natural
    # threshold for this contrastive scale: signal > 0.05 means "harder
    # than easy", which is what :hard should mean.
    threshold: 0.05
    # Bumped 0.20 → 0.24 so a single :hard match alone clears the
    # tier3→tier4 cutoff (0.18). Calibrated against the q00640/q00659/
    # q00643 misroute pattern where proof-shape prompts scored :medium
    # AND were short, leaving them at T1 with score ≈ 0.
    weight: 0.24
    hard:
      candidates:
        # Multi-step reasoning
        - "Demonstrate that there are infinitely many primes."
        - "Three pipes fill a tank — pipe A in 6 hours, B in 8 hours, C empties it in 12 hours. If all run together starting from empty, when is the tank full?"
        - "Walk through how a sudden 30% drop in labor-force participation would propagate through a modern economy over the following year."
        # Deep domain expertise
        - "Explain why the Banach-Tarski paradox doesn't contradict measure theory."
        - "Trace the doctrinal evolution of the Commerce Clause from Wickard v. Filburn to NFIB v. Sebelius."
        - "Walk through how Raft handles the split-vote scenario and the design choices that prevent livelock."
        # Open-ended judgment
        - "I'm a senior engineer choosing between a tech lead role with people management and an IC architect role. How should I think about this?"
        - "Discuss the ethical tensions in deploying facial recognition in public spaces, balancing law-enforcement utility against civil-liberties harms."
        # Commitment / position-taking
        - "Construct a serious, original argument for a non-obvious philosophical position and defend it without retreat."
        - "Of these architectural approaches, pick one and tell me why — don't survey the options."
        # Synthesis at length
        - "Write a literary short story of approximately 1500-2000 words sustaining a single voice and structural arc."
        - "Critique this paper's methodology, identifying three structurally distinct problem classes."
        # Mathematical proof / formal derivation — added to capture the
        # proof-shape T3/T4 prompts the prior bank missed (induction,
        # constrained optimization, MLE/CI, divergence/convergence
        # arguments, combinatorial identities). Phrased as generic
        # archetypes — no overlap with eval-set prompts.
        - "Establish by induction over the positive integers that a stated algebraic identity holds, including the base case and inductive step in full."
        - "Derive the maximum of a constrained multivariable objective using Lagrange multipliers and verify the second-order conditions."
        - "Show that an infinite series diverges by constructing a comparison or partial-sum argument from first principles."
        - "Prove that a stated inequality holds for all positive real values by reducing it to a canonical inequality such as Cauchy-Schwarz or AM-GM."
        - "Compute the maximum likelihood estimator for a probability parameter from sample data and construct an approximate confidence interval, justifying the asymptotic argument."
        - "Prove a combinatorial identity by a bijective argument or by induction on a structural parameter."
        # SHORT proof / derivation archetypes — necessary because the
        # contrastive classifier compares against the closest exemplar
        # in embedding space, and short prompts can't get close to long
        # ones. These match the length profile of "Prove √2 is
        # irrational" (q00659) or "Solve T(n) = T(n/3) + T(2n/3) + n"
        # (q00674). Generic shape, no eval-set overlap.
        - "Prove an algebraic identity by induction."
        - "Show that an infinite series diverges."
        - "Prove a stated real number is irrational."
        - "Solve a recurrence relation of given form."
        - "Compute a multivariable integral over a bounded region."
        - "Apply the central limit theorem to construct a confidence interval."
        - "Maximize a constrained function via Lagrange multipliers."
    easy:
      candidates:
        # Factual lookups — purposely NON-math. The contrastive
        # classifier compares hard vs easy in embedding space; ANY
        # math-flavored easy exemplar (including single-digit
        # arithmetic) slightly raises easy_score for math-flavored
        # proofs via shared vocabulary, and the contrastive margin
        # is razor-thin (range ~[-0.32, +0.11]) — even a small bump
        # flips proofs from :hard back to :medium. Trivial arithmetic
        # is anchored at T1 via the `trivial_lookup` detractor instead.
        - "Which artist painted the Sistine Chapel ceiling?"
        - "What is the chemical symbol for sodium?"
        - "Who wrote 'The Great Gatsby'?"
        - "What currency is used in Japan?"
        - "What is the largest organ in the human body?"
        - "Name the capital city of Mongolia."
        - "Who composed 'The Four Seasons'?"
        - "In what year did the Berlin Olympics take place?"
        # Simple definitions
        - "Define photosynthesis."
        - "What is a peninsula?"
        - "What does the acronym HTML stand for?"
        - "How do you say 'thank you' in French?"

# ═════════════════════════════════════════════════════════════════════════
# Embedding signals — continuous semantic similarity
# ═════════════════════════════════════════════════════════════════════════
# Two single-bank embedding signals, one promoter (positive weight) and
# one detractor (negative weight). Each contributes via
# `value_source: confidence` so high similarity → strong contribution,
# low similarity → near-zero. The threshold gates whether the signal
# matches at all; below it, the embedding contributes 0.
#
# The detractor pattern is the upstream canonical way to push trivial
# queries down: `trivial_lookup` fires strongly for short factual asks
# and SUBTRACTS from request_difficulty, anchoring those queries at T1.

embedding_signals:

  # ─────────────────────────────────────────────────────────────────────
  # TRIVIAL LOOKUP — detractor (negative weight)
  # ─────────────────────────────────────────────────────────────────────
  # Short factual asks, definitions, simple conversions. When this fires,
  # it pulls request_difficulty DOWN, anchoring trivial queries in T1.
  - id: trivial_lookup
    description: "Continuous similarity to short factual / lookup-shaped prompts. Math-flavored exemplars deliberately omitted — they directly hit proof prompts (q00666 had this detractor fire on a Lagrange-multipliers prompt), which is the opposite of intent."
    threshold: 0.65
    weight: -0.20
    aggregation_method: max
    candidates:
      - "Which artist sculpted David?"
      - "What is the largest country by area?"
      - "What does the acronym CPU stand for?"
      - "Define osmosis."
      - "What is the chemical formula for water?"
      - "Who invented the telephone?"
      - "In what year did the Berlin Wall fall?"
      - "Translate 'hello' to Spanish."
      - "Who is the current monarch of the United Kingdom?"
      - "What is the official language of Brazil?"
      - "Name the deepest ocean on Earth."
      - "What does the acronym DNA stand for?"
      # Tight single-digit arithmetic. Same logic as the easy-bank
      # additions above: detracts "What is 9 × 7?"-shape prompts back
      # to T1 without re-introducing math-vocabulary contamination
      # that would pull rigorous proof prompts toward this detractor.
      - "What is 7 plus 4?"
      - "What is 12 divided by 3?"
      - "What is half of 20?"
      - "What is 6 times 5?"

  # ─────────────────────────────────────────────────────────────────────
  # MODERATE COMPLEXITY — middle-tier promoter
  # ─────────────────────────────────────────────────────────────────────
  # The structure signals only fire for verbose / multi-part prompts
  # (100+ words, code blocks, numbered lists). Most T2/T3/T4 prompts are
  # short and technical — explain-how, compare-and-contrast, basic
  # implementations — and trigger none of those structural markers.
  # This embedding bank captures those semantically: queries matching it
  # are "moderately complex" regardless of length.
  - id: moderate_complexity
    description: "Continuous similarity to T2/T3-grade explanation, comparison, and basic-implementation prompts."
    threshold: 0.60
    weight: 0.22
    aggregation_method: max
    candidates:
      # Explain-how — technical concepts at moderate depth
      - "Explain how a database B-tree index handles range queries with a worked example."
      - "Walk me through how a TLS handshake establishes a shared key — the cryptographic flow at a protocol level."
      - "Explain Bayes' theorem using a concrete worked example like spam classification or medical screening."
      # Compare-and-contrast
      - "Compare TCP, UDP, and SCTP — when to use each, and what trade-offs you're picking up."
      - "What are the operational differences between microservices and modular monoliths for a mid-sized engineering team?"
      - "Compare reference counting and tracing garbage collectors — what each gets right and where they typically fail."
      # Implement-basic — concrete code with moderate scope
      - "Implement a thread-safe LRU cache in Go with O(1) get and put operations."
      - "Write a Python decorator that retries a function with exponential backoff on configured exception types."
      - "Implement a Bloom filter in Python with configurable false-positive rate."
      # Walk-through / diagnostic
      - "Walk me through how to diagnose an event-driven Node.js backend with a slow memory leak under steady-state load."
      - "Explain what 'eventual consistency' actually means at the application level, with the operational implications that matter to developers."
      - "Walk through how a confusion matrix is computed for a multi-class classifier, including precision, recall, and F1 per class."
      # Quantitative reasoning — probability, statistics, simple
      # business arithmetic, percentage analysis. Captures the T3-grade
      # quantitative-explanation archetypes that the prior bank missed
      # (probability problems, hypothesis tests, business break-even,
      # percentage decomposition).
      - "Solve a probability problem involving combinatorics and conditional events over a finite sample space."
      - "Run a hypothesis test on whether a sample proportion differs significantly from a stated baseline."
      - "Compute a business break-even point given fixed costs, variable costs, and gross margin."
      - "Analyze how a stated percentage shift in inputs propagates through a multi-component budget or scoring formula."

  # ─────────────────────────────────────────────────────────────────────
  # FRONTIER SYNTHESIS — promoter (positive weight)
  # ─────────────────────────────────────────────────────────────────────
  # Long-form synthesis, original argument construction, multi-domain
  # analysis with commitment to a position. Fires strongly for genuine
  # T5-grade prompts.
  - id: frontier_synthesis
    description: "Continuous similarity to T5-grade frontier prompts."
    # Threshold tightened 0.65 → 0.70. NOTE: the tier4_band→tier5 lane
    # condition fires on vllm-sr's soft-match (~0.50), not this strict
    # threshold, so threshold alone can't stop spurious lane firing.
    #
    # The structural fix is the WEIGHT (0.25 → 0.15): with weight 0.15
    # a soft-match at 0.60 contributes only 0.09 to request_difficulty,
    # so without other strong positive signals the score stays in
    # tier3_band — and the lane condition `tier4_band` then fails, so
    # the lane can't fire on borderline matches. Genuine T5 prompts
    # (frontier strict match ≥ 0.70 + long_prompt) still clear into
    # tier4_band and trigger the lane.
    threshold: 0.70
    weight: 0.15
    aggregation_method: max
    candidates:
      # Position-taking with self-critique (replaces two paragraph-style
      # literary-craft exemplars that semantically matched "Summarize
      # this paragraph: ..."-shape prompts and triggered the T5 lane on
      # them — see q00111 misroute).
      - "Take a contested position on a long-standing debate within a field, anticipate the strongest counter-argument, and refute it without retreating to consensus or hedging."
      - "Construct an original evaluative framework for a domain where consensus methodologies are widely criticized. Take the strongest critique seriously and produce actionable recommendations."
      # Original argument for non-consensus position
      - "Construct a defensible position that contemporary management consulting as an industry is net-negative for the organizations it serves. Anticipate and respond to the strongest objection without retreat."
      - "Argue rigorously for the position that the term 'mental health' as used in workplace HR has become incoherent. Discriminate this claim from anti-therapy and anti-mental-health-awareness positions. Propose a constructive replacement framework."
      # Thick-context life advice that refuses framework
      - "Walk this person through whether to remain in academia or leave for industry: 38-year-old researcher with two children, ten years from tenure, meaningful but underfunded research agenda. Refuse the considerations-list response. Commit to a recommendation."
      # Frontier code review with intent reconstruction
      - "Review this Raft-adjacent leader-election implementation. Reconstruct the author's mental model, identify where it diverges from canonical Raft, walk through the worst-case operational scenario, and propose minimum fixes."
      - "Read this exponential-backoff retry decorator. The author was clearly attempting a named algorithm from a well-known blog post. Identify what they intended, where the implementation diverges, and what operational symptom would distinguish this from a correct one."
      # Multi-stakeholder policy with rule-text specificity and self-critique
      - "Propose specific regulatory mechanisms for how a US federal agency should govern healthcare AI deployment over the next three years, with rule-text-level specificity. Identify the weakest part of your own proposal and explain why."
      # Methodological critique with counterfactual reasoning
      - "Critique this paper's claim that scaling laws hold across modality boundaries. Identify three structurally distinct methodological problems. For each, propose a modification AND identify the new problem the modification introduces."
      # Translation as literary judgment
      - "Translate this Mandarin poem into idiomatic English while preserving the original's cadence and tonal patterns. Write a half-page paratext explaining your three hardest translation decisions and why."
      # Diagnostic organizational analysis
      - "Diagnose what's actually happening at a 400-person scaleup that has just lost three senior engineers in two months. Leadership disagrees on cause. Engage with this as organizational analysis with specific signals to trust, not as a strategy framework."
      # Constructive ethical framework (not synthesis)
      - "Construct an original ethical framework that takes seriously both the effective-altruist and the communitarian critiques rather than synthesizing them. Test your frame against the canonical thought experiments each tradition has used."
      # NOTE: long-form generative writing archetypes (sonnet, story
      # pastiche, sustained-voice dialogue) were tried here but
      # measurably pulled "Summarize this paragraph: ..." and similar
      # condensation prompts above the tier4_band cutoff, re-creating
      # the q00111 → T5 misroute. Creative writing T5 catchment is
      # left as future work — likely a separate signal or stricter
      # lane condition rather than additions to this bank.

  # ─────────────────────────────────────────────────────────────────────
  # ARGUMENTATIVE CONSTRUCTION — judgment-and-commitment T4 catcher
  # ─────────────────────────────────────────────────────────────────────
  # Diagnostic identified a specific T4 under-route pattern: judgment
  # prompts that demand a position/recommendation/diagnosis rather than
  # a survey, AND don't match `moderate_complexity`'s technical archetypes
  # (TLS, B-tree, etc.) so moderate doesn't fire for them. They have no
  # signal contribution and collapse to T3 or below.
  #
  # Archetypes are written as GENERIC patterns of "demand commitment"
  # rather than paraphrases of specific eval prompts — capturing the
  # CATEGORY (decide, recommend, diagnose, take a position) without
  # tying to particular eval-set content.
  - id: argumentative_construction
    description: "Continuous similarity to judgment/commitment-shape T4 prompts (decide, recommend, diagnose, take-a-position). Threshold lowered to 0.58 so discursive 'discuss the considerations'-shape prompts also match (e.g., ethical/philosophical considerations queries) — they're argumentative-adjacent even when not commit-shaped."
    threshold: 0.58
    weight: 0.18
    aggregation_method: max
    candidates:
      - "Make the case for a specific architectural pattern over its alternatives. Don't survey — commit to one."
      - "Help me think through whether to fire an underperforming team member. Engage with this specific situation."
      - "Pick one of these design options and tell me why. No surveys, no hedging."
      - "Should we adopt this framework across the org? Take a position and defend it."
      - "Recommend a specific book that would help someone in this situation. Just one."
      - "Make a call: yes or no, and explain your reasoning. No 'it depends'."
      - "Diagnose what's wrong with this team dynamic. Be specific, not abstract."
      - "What's the single most important risk in this plan? Pick one."
      - "Take a position on whether this technology will succeed. Defend it with specifics."
      - "Engage with the strongest objection to this argument and rebut it."
      # Replaced two discursive-shape exemplars ("Walk this person
      # through their decision...", "Should this organization make this
      # change?...") with sharper commit-shape archetypes. The previous
      # phrasing was soft-matching short summarize prompts (q00102:
      # "Summarize the main point of this sentence in fewer words: ..."
      # → T4 via this signal).
      - "Decide between two competing strategies and commit to one with a one-line justification."
      - "Make a deployment call: ship now or wait two weeks. Pick one and defend it."

# ═════════════════════════════════════════════════════════════════════════
# Structure signals — mechanical / regex properties of the prompt
# ═════════════════════════════════════════════════════════════════════════
# Deterministic gates based on prompt shape. No embeddings, no training.
# Each is binary: fires (contributes weight) or doesn't (contributes 0).
# Schema mirrors upstream config.yaml — feature {type, source} + predicate.

structure_signals:

  - id: short_prompt
    description: "Fires when the prompt has fewer than 12 words. Mechanical detractor — pulls down very-short queries that semantically resemble moderate-complexity archetypes (e.g., 'what is X?' / 'why is X?') without competing with moderate in semantic space. Predicate is tight (lt: 12) and weight modest (-0.05) so it stacks with `trivial_lookup` (the primary -0.20 detractor) for true trivials but doesn't overpower a genuine :hard match on a terse-but-rigorous prompt like 'Prove √2 is irrational' (7 tokens)."
    weight: -0.05
    feature:
      type: count
      source:
        type: regex
        pattern: '\S+'
    predicate:
      lt: 12

  - id: long_prompt
    description: "Fires when the prompt has 25+ words. Catches medium-length T3/T4 prompts that don't trigger any other structural signal. Threshold tuned to catch ~25-30 word technical design prompts (e.g., 'design a system to X at scale')."
    weight: 0.08
    feature:
      type: count
      source:
        type: regex
        pattern: '\S+'
    predicate:
      gte: 25

  - id: very_long_prompt
    description: "Fires when the prompt has 400+ words. Suggests long-form / complex ask."
    weight: 0.10
    feature:
      type: count
      source:
        type: regex
        pattern: '\S+'
    predicate:
      gte: 400

  - id: code_block_present
    description: "Fires when the prompt contains a fenced code block (```...```)."
    weight: 0.07
    feature:
      type: count
      source:
        type: regex
        pattern: '```'
    predicate:
      gte: 2

  - id: multi_question
    description: "Fires when the prompt has 2+ question marks — multi-part ask."
    weight: 0.05
    feature:
      type: count
      source:
        type: regex
        pattern: '[?？]'
    predicate:
      gte: 2

  - id: numbered_constraints
    description: "Fires when the prompt has a numbered list (`1.`, `2.`, ...). Common in structured / multi-part prompts."
    weight: 0.05
    feature:
      type: exists
      source:
        type: regex
        pattern: '(?m)^\s*\d+\.\s+'

# ═════════════════════════════════════════════════════════════════════════
# Context signals — request-level facts known to the router
# ═════════════════════════════════════════════════════════════════════════
# Token-range gating. Long-context requests need bigger / more-capable
# models regardless of semantic difficulty.

context_signals:

  - id: long_context
    description: "Requests that need larger context windows (>2K tokens)."
    weight: 0.10
    min_tokens: "2K"
    max_tokens: "200K"
