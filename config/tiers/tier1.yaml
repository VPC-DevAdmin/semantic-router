# Tier 1 — tier metadata only. The callable model(s) for this tier come
# from `.env`'s `TIER1_{i}_*` slots; the LAUNCH RECIPE (image, cpuset,
# vLLM args, sampler) for any local model that .env points at lives in
# config/local_models.yaml keyed by that model's served name.

name: tier1
level: 1
specializations: [general]
# CPU inference of 200-500 tokens on Qwen3-1.7B at concurrency >1 can
# take 30-90s per request; 180s gives headroom.
timeout_s: 180
# What the router emits in `x-vsr-selected-model` (used for tier lookup).
router_alias: tier1
