# How the harness launches and reaches the vLLM Semantic Router.
#
# This file does NOT configure the router internals — those live in the
# router's own config (managed by `vllm-sr` itself). It tells the harness
# which binary to spawn, what arguments to pass, and where to find the
# router's apiserver and Envoy frontend.
#
# Install the router with:
#   curl -fsSL https://vllm-semantic-router.com/install.sh | bash

binary: vllm-sr

# Extra args appended to `vllm-sr serve`. Common picks:
#   - --image-pull-policy never   # use locally-built images (dev workflow)
#   - --platform amd              # use ROCm on AMD systems
#   - --minimal                   # skip dashboard + observability for faster startup
# We always pass --config so vllm-sr loads our checked-in routing config
# instead of its auto-generated setup-mode default.
serve_args:
  - --config
  - config/vllm-sr.yaml
  - --minimal

# Environment variables merged into the subprocess env. Use these for HF_TOKEN
# and any provider keys the router itself needs.
env: {}
#  HF_TOKEN: hf_xxx

apiserver_host: 127.0.0.1
apiserver_port: 8080            # GET /ready, /health, /api/v1/*

frontend_host: 127.0.0.1
# 8899 matches the Envoy listener that `vllm-sr serve` auto-generates.
# If your config.yaml uses a different port, set it here.
frontend_port: 8899             # POST /v1/chat/completions (Envoy ingress)

ready_timeout_s: 120
stop_timeout_s: 15

# If set, capture launcher stdout+stderr to this path. Helpful for postmortems.
log_path: logs/router.log

# What the harness sends as the `model` field to invoke routing.
auto_model_name: auto

# If true, the harness assumes the router is already running externally and
# will not spawn or stop it. Useful for shared dev stacks or CI.
external: false

# If true, run `vllm-sr stop` on harness exit to tear down the Docker stack.
# Default false: leave the stack up between benchmark runs so cold-start
# (image pulls, container creation) is paid only once.
stop_on_exit: false
