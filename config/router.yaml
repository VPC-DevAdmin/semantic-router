# How the harness launches and reaches the vLLM Semantic Router.
#
# This file does NOT configure the router internals — those live in the
# router's own config (managed by `vllm-sr` itself). It tells the harness
# which binary to spawn, what arguments to pass, and where to find the
# router's apiserver and Envoy frontend.
#
# Install the router with:
#   curl -fsSL https://vllm-semantic-router.com/install.sh | bash

binary: vllm-sr

# Extra args appended to `vllm-sr serve`. Common picks:
#   - --image-pull-policy never   # use locally-built images (dev workflow)
#   - --platform amd              # use ROCm on AMD systems
#   - --minimal                   # skip dashboard + observability for faster startup
# We always pass --config so vllm-sr loads our checked-in routing config
# instead of its auto-generated setup-mode default.
serve_args:
  - --config
  - config/router-config.yaml
  - --minimal
  # Pin the container image to the known-good release. The CLI version and this
  # image must match; v0.2.0 leaves the request path dead (doesn't start the
  # postgres/redis backends the router needs). Keep in sync with VLLM_SR_VERSION
  # in the Makefile and VLLM_SR_IMAGE in tools/interactive_server.py.
  - --image
  - ghcr.io/vllm-project/semantic-router/vllm-sr:v0.3.0

# Environment variables merged into the subprocess env. Use these for HF_TOKEN
# and any provider keys the router itself needs. `vllm-sr serve` forwards
# HF_* through into the router container.
#
# HF_HUB_DISABLE_XET / HF_HUB_ENABLE_HF_TRANSFER: on first launch the router
# downloads its embedding model (mmbert-embed-32k-2d-matryoshka) from
# HuggingFace. HF's newer "Xet" file backend (cas-bridge.xethub.hf.co) is
# blocked on many networks (returns 403), which makes the download fail with a
# misleading "does not seem to be on huggingface.co" error even though the
# metadata API and the classic LFS CDN are reachable.
#   NOTE: vllm-sr forwards only a fixed HF allowlist (HF_TOKEN/HF_ENDPOINT/
#   HF_HOME) into the router container — NOT HF_HUB_DISABLE_XET — so setting it
#   here does not actually reach the downloader. The real fix is `make
#   fetch-router-model`, which pre-seeds the model into the bind-mounted
#   config/models so the router skips the download (`make route` runs it
#   automatically). These vars are kept as harmless belt-and-suspenders in case
#   a future vllm-sr forwards them.
env:
  HF_HUB_DISABLE_XET: "1"
  HF_HUB_ENABLE_HF_TRANSFER: "0"
#  HF_TOKEN: hf_xxx

apiserver_host: 127.0.0.1
apiserver_port: 8080            # GET /ready, /health, /api/v1/*

frontend_host: 127.0.0.1
# 8899 matches the Envoy listener that `vllm-sr serve` auto-generates.
# If your config.yaml uses a different port, set it here.
frontend_port: 8899             # POST /v1/chat/completions (Envoy ingress)

# First launch downloads the embedding model (~150 MB, observed ~2.5 min on a
# warm network) before the apiserver reports ready, so the cold-start window is
# generous. The model persists in the bind-mounted config/models, so subsequent
# launches are fast — a 120s timeout was too short and tripped on first run.
ready_timeout_s: 900
stop_timeout_s: 15

# If set, capture launcher stdout+stderr to this path. Helpful for postmortems.
log_path: logs/router.log

# What the harness sends as the `model` field to invoke routing.
auto_model_name: auto

# If true, the harness assumes the router is already running externally and
# will not spawn or stop it. Useful for shared dev stacks or CI.
external: false

# If true, run `vllm-sr stop` on harness exit to tear down the Docker stack.
# Default false: leave the stack up between benchmark runs so cold-start
# (image pulls, container creation) is paid only once.
stop_on_exit: false
